---
############################################
# Scan repository for publishable images   #
# and build/push changed container images. #
#                                          #
# Builds only images with publish: true.   #
############################################

name: Build and publish images

on:
  push:
    branches: [ main ]
    paths:
      - "**/image.yml"
      - "**/Dockerfile"

  workflow_dispatch:
    inputs:
      image:
        description: "Optional path to a single image directory"
        required: false
        type: string
      dry_run:
        required: false
        default: false
        type: boolean
      force:
        required: false
        default: false
        type: boolean

  workflow_call:
    inputs:
      image:
        required: false
        type: string
      dry_run:
        required: false
        type: boolean
      force:
        required: false
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  plan:
    runs-on: ubuntu-latest

    outputs:
      empty: ${{ steps.buildlist.outputs.empty }}
      dry_run: ${{ steps.meta.outputs.dry_run }}
      force: ${{ steps.meta.outputs.force }}
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: mikefarah/yq@v4.53.2

      ## Normalize inputs so push / dispatch / call all behave the same
      - name: Normalize inputs
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          DRY_RUN="${{ inputs.dry_run || false }}"
          FORCE="${{ inputs.force || false }}"
          IMAGE="${{ inputs.image || '' }}"

          echo "dry_run=$DRY_RUN" >> $GITHUB_OUTPUT
          echo "force=$FORCE" >> $GITHUB_OUTPUT
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Detect changed files
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "push" ]]; then
            git diff --name-only HEAD~1 HEAD > changed_files.txt || true
          else
            : > changed_files.txt
          fi

      - name: Determine images to build
        id: buildlist
        shell: bash
        run: |
          set -euo pipefail

          chmod +x ./scripts/build/determine-images-to-build.sh

          ARGS=()
          [[ -n "${{ steps.meta.outputs.image }}" ]] && ARGS+=(--image-dir "${{ steps.meta.outputs.image }}")
          [[ "${{ steps.meta.outputs.force }}" == "true" ]] && ARGS+=(--force)

          ./scripts/build/determine-images-to-build.sh "${ARGS[@]}" build_list.txt

          if [[ -s build_list.txt ]]; then
            echo "empty=false" >> $GITHUB_OUTPUT
          else
            echo "empty=true" >> $GITHUB_OUTPUT
          fi

      - uses: actions/upload-artifact@v4
        if: steps.buildlist.outputs.empty != 'true'
        with:
          name: build-list
          path: build_list.txt

  build:
    runs-on: ubuntu-latest
    needs: plan
    if: needs.plan.outputs.empty == 'false'

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: build-list

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: needs.plan.outputs.dry_run != 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish images
        shell: bash
        run: |
          set -euo pipefail

          chmod +x ./scripts/build/build-and-publish-images.sh

          ARGS=()
          [[ "${{ needs.plan.outputs.dry_run }}" == "true" ]] && ARGS+=(--dry-run)
          [[ "${{ needs.plan.outputs.force }}" == "true" ]] && ARGS+=(--force)

          ./scripts/build/build-and-publish-images.sh "${ARGS[@]}" build_list.txt
