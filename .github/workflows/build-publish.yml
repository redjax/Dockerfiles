---
############################################
# Scan repository for publishable images   #
# and build/push changed container images. #
#                                          #
# Builds only images with publish: true.   #
############################################

name: Build and publish images

on:
  push:
    branches:
      - main
    paths:
      - "**/image.yml"
      - "**/Dockerfile"

  workflow_dispatch:
    inputs:
      image:
        description: "Optional path to a single image directory, e.g. base/alpine"
        required: false
        type: string
      dry_run:
        description: "Build without pushing"
        required: false
        default: false
        type: boolean
      force:
        description: "Force build & publish even if unchanged"
        required: false
        default: false
        type: boolean

  workflow_call:
    inputs:
      image:
        description: "Optional path to a single image directory, e.g. base/alpine"
        required: false
        type: string
      dry_run:
        description: "Build without pushing"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install yq
        uses: mikefarah/yq@v4.53.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: inputs.dry_run != true
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect changed files
        id: diff
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "push" ]]; then
            git diff --name-only HEAD~1 HEAD > changed_files.txt || true
          else
            : > changed_files.txt
          fi

          cat changed_files.txt || true

      - name: Determine images to build
        shell: bash
        run: |
          set -euo pipefail

          chmod +x ./scripts/build/determine-images-to-build.sh

          IMAGE_DIR="${{ inputs.image || '' }}"
          FORCE="${{ inputs.force }}"
          CHANGED_FILES_FILE="changed_files.txt"

          ./scripts/build/determine-images-to-build.sh build_list.txt

      - name: Build and publish images
        shell: bash
        run: |
          set -euo pipefail

          chmod +x ./scripts/build/build-and-publish-images.sh

          DRY_RUN="${{ inputs.dry_run }}"
          FORCE="${{ inputs.force }}"

          ./scripts/build/build-and-publish-images.sh build_list.txt
