############################################
# Scan repository for image.yml manifests  #
# and check for updated upstream versions. #
#                                          #
# Patch image.yml & Dockerfile on upstream #
# version changes.                         #
############################################

name: Update image manifests

on:
  pull_request:
    paths:
      - "**/image.yml"
      - "**/Dockerfile"
      - "scripts/update/**"

  workflow_dispatch:
    inputs:
      image:
        description: "Optional path to a single image directory, e.g.
          dockerfiles/base/alpine"
        required: false
        type: string
      dry_run:
        description: "Dry run - preview changes without committing"
        required: false
        default: false
        type: boolean

  workflow_call:
    inputs:
      image:
        required: false
        type: string
      dry_run:
        required: false
        type: boolean

concurrency:
  group: update-images
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  plan:
    runs-on: ubuntu-latest

    outputs:
      changed: ${{ steps.changes.outputs.changed }}
      dry_run: ${{ steps.meta.outputs.dry_run }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - uses: mikefarah/yq@v4.53.2

      - name: Normalize inputs
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          echo "dry_run=${{ inputs.dry_run || false }}" >> $GITHUB_OUTPUT

      - name: Find image manifests
        shell: bash
        run: |
          set -euo pipefail

          : > manifests.txt

          if [[ -n "${{ inputs.image || '' }}" ]]; then
            find "./${{ inputs.image }}" -name image.yml -type f | sort > manifests.txt
          else
            find . -name image.yml -type f | sort > manifests.txt
          fi

          [[ -s manifests.txt ]] || exit 0

      - name: Update manifests
        shell: bash
        run: |
          set -euo pipefail

          DRY_RUN="${{ inputs.dry_run || false }}"

          [[ -s manifests.txt ]] || exit 0

          while IFS= read -r manifest; do
            [[ -n "$manifest" ]] || continue

            ./scripts/update/bump-image-manifest.sh \
              --file "$manifest" \
              $([[ "$DRY_RUN" == "true" ]] && echo "--dry-run")
          done < manifests.txt

      - name: Create diff artifact
        shell: bash
        run: |
          set -euo pipefail

          git diff > changes.patch || true

      - name: Detect changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat
          fi

      - name: Upload patch
        if: steps.changes.outputs.changed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: image-updates
          path: changes.patch

  commit:
    runs-on: ubuntu-latest
    needs: plan
    if: needs.plan.outputs.changed == 'true' && needs.plan.outputs.dry_run != 'true'

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Download patch
        uses: actions/download-artifact@v7
        with:
          name: image-updates

      - name: Apply patch
        run: |
          set -euo pipefail
          git apply changes.patch

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push
        run: |
          git add -A

          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi

          git commit -m "chore: update image manifests and dockerfile args"
          git push
