---
############################################
# Scan repository for image.yml manifests  #
# and check for updated upstream versions. #
#                                          #
# Path the image.yml & Dockerfile on new   #
# upstream versions.                       #
############################################

name: Update image manifests

on:
  workflow_dispatch:
    inputs:
      image:
        description: "Optional path to a single image directory, e.g. base/alpine"
        required: false
        type: string
      dry_run:
        description: "Preview changes without committing"
        required: false
        default: false
        type: boolean
  # schedule:
  #   - cron: "0 3 * * *"

concurrency:
  group: update-images
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install yq
        uses: mikefarah/yq@v4.44.3

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Find image manifests
        id: manifests
        shell: bash
        run: |
          set -euo pipefail

          : > manifests.txt

          if [[ -n "${{ inputs.image || '' }}" ]]; then
            find "./${{ inputs.image }}" -name image.yml -type f | sort > manifests.txt
          else
            find . -name image.yml -type f | sort > manifests.txt
          fi

          count="$(wc -l < manifests.txt | tr -d ' ')"
          echo "count=$count" >> "$GITHUB_OUTPUT"

          if [[ "$count" -eq 0 ]]; then
            echo "No image manifests found."
          fi

      - name: Update manifests and Dockerfiles
        id: update
        shell: bash
        run: |
          set -euo pipefail

          DRY_RUN=""
          if [[ "${{ inputs.dry_run || false }}" == "true" ]]; then
            DRY_RUN="--dry-run"
          fi

          manifest_changed=false
          dockerfile_changed=false

          while IFS= read -r manifest; do
            [[ -n "$manifest" ]] || continue

            echo "Processing $manifest"

            before="$(git status --porcelain=v1)"

            ./scripts/update/bump-image-manifest.sh --file "$manifest" $DRY_RUN

            after_manifest="$(git status --porcelain=v1)"
            if [[ "$after_manifest" != "$before" ]]; then
              manifest_changed=true
            fi

            before="$(git status --porcelain=v1)"

            ./scripts/update/bump-dockerfile-arg.sh --file "$manifest" $DRY_RUN

            after_dockerfile="$(git status --porcelain=v1)"
            if [[ "$after_dockerfile" != "$before" ]]; then
              dockerfile_changed=true
            fi
          done < manifests.txt

          echo "manifest_changed=$manifest_changed" >> "$GITHUB_OUTPUT"
          echo "dockerfile_changed=$dockerfile_changed" >> "$GITHUB_OUTPUT"

      - name: Detect changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat
          fi

      - name: Show diff
        if: steps.changes.outputs.changed == 'true' && inputs.dry_run == true
        run: |
          git diff --unified=3

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true' && inputs.dry_run != true
        run: |
          git add -A
          git commit -m "chore: update image manifests and dockerfile args"
          git push
