---
############################################
# Scan repository for image.yml manifests  #
# and check for updated upstream versions. #
#                                          #
# Path the image.yml & Dockerfile on new   #
# upstream versions.                       #
############################################

name: Update image manifests

on:
  pull_request:
    paths:
      - "**/image.yml"
      - "**/Dockerfile"
      - "scripts/update/**"

  workflow_dispatch:
    inputs:
      image:
        description: "Optional path to a single image directory, e.g. base/alpine"
        required: false
        type: string
      dry_run:
        description: "Dry run - preview changes without committing"
        required: false
        default: false
        type: boolean

  workflow_call:
    inputs:
      image:
        required: false
        type: string
      dry_run:
        required: false
        type: boolean

concurrency:
  group: update-images
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install yq
        uses: mikefarah/yq@v4.53.2

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Find image manifests
        shell: bash
        run: |
          set -euo pipefail

          : > manifests.txt

          if [[ -n "${{ inputs.image || '' }}" ]]; then
            find "./${{ inputs.image }}" -name image.yml -type f | sort > manifests.txt
          else
            find . -name image.yml -type f | sort > manifests.txt
          fi

          if [[ ! -s manifests.txt ]]; then
            echo "No image manifests found."
            exit 0
          fi

      - name: Update manifests and Dockerfiles
        shell: bash
        run: |
          set -euo pipefail

          DRY_RUN="${{ inputs.dry_run || false }}"

          while IFS= read -r manifest; do
            [[ -n "$manifest" ]] || continue

            echo "Processing $manifest"

            output="$(./scripts/update/bump-image-manifest.sh --file "$manifest" ${DRY_RUN:+--dry-run})"
            echo "$output"

          done < manifests.txt

      - name: Detect changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          git add -A

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"
          git diff --stat

      - name: Show diff
        if: steps.changes.outputs.changed == 'true' && inputs.dry_run == true
        run: |
          git diff --unified=3

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true' && inputs.dry_run != true
        run: |
          git commit -m "chore: update image manifests and dockerfile args"
          git push
