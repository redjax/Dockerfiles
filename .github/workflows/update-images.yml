############################################
# Scan repository for image.yml manifests  #
# and check for updated upstream versions. #
#                                          #
# Patch image.yml & Dockerfile on upstream #
# version changes.                         #
############################################

name: Update image manifests

on:
  pull_request:
    paths:
      - "**/image.yml"
      - "**/Dockerfile"
      - "scripts/update/**"

  workflow_dispatch:
    inputs:
      image:
        description: "Optional path to a single image directory, e.g. dockerfiles/base/alpine"
        required: false
        type: string
      dry_run:
        description: "Dry run - preview changes without committing"
        required: false
        default: false
        type: boolean

  workflow_call:
    inputs:
      image:
        required: false
        type: string
      dry_run:
        required: false
        type: boolean

concurrency:
  group: update-images
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  plan:
    runs-on: ubuntu-latest

    outputs:
      changed: ${{ steps.detect.outputs.changed }}
      base_sha: ${{ steps.meta.outputs.base_sha }}
      dry_run: ${{ steps.meta.outputs.dry_run }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.sha }}

      - uses: mikefarah/yq@v4.53.2

      - name: Normalize inputs
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          echo "base_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "dry_run=${{ inputs.dry_run || false }}" >> "$GITHUB_OUTPUT"

      - name: Find image manifests
        shell: bash
        run: |
          set -euo pipefail

          : > manifests.txt

          if [[ -n "${{ inputs.image || '' }}" ]]; then
            find "./${{ inputs.image }}" -name image.yml -type f | sort > manifests.txt
          else
            find . -name image.yml -type f | sort > manifests.txt
          fi

          [[ -s manifests.txt ]] || exit 0

      - name: Detect updated images
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          : > changed_images.txt

          [[ -s manifests.txt ]] || exit 0

          while IFS= read -r manifest; do
            [[ -n "$manifest" ]] || continue

            before=$(mktemp)

            cp "$manifest" "$before"

            ./scripts/update/bump-image-manifest.sh \
              --file "$manifest" \
              --dry-run

            if ! diff -q "$before" "$manifest" >/dev/null; then
              dirname "$manifest" >> changed_images.txt
            fi
          done < manifests.txt

          sort -u -o changed_images.txt changed_images.txt || true

          if [[ -s changed_images.txt ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload changed image list
        if: steps.detect.outputs.changed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: changed-images
          path: changed_images.txt

  commit:
    runs-on: ubuntu-latest
    needs: plan
    if: needs.plan.outputs.changed == 'true' && needs.plan.outputs.dry_run != 'true'

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.plan.outputs.base_sha }}

      - name: Download changed images
        uses: actions/download-artifact@v8
        with:
          name: changed-images

      - name: Re-run image updates
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -f changed_images.txt ]]; then
            echo "No changed images"
            exit 0
          fi

          while IFS= read -r dir; do
            [[ -n "$dir" ]] || continue

            find "$dir" -name image.yml -type f | while read -r manifest; do
              echo "Updating $manifest"

              ./scripts/update/bump-image-manifest.sh \
                --file "$manifest"
            done
          done < changed_images.txt

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail

          git add -A

          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi

          git commit -m "chore: update image manifests"
          git push
