---
#############################################
# Scheduled nightly update check.           #
#                                           #
# Finds image.yml manifests and checks for  #
# updates to upstream images. Rebuilds and  #
# publishes any changed containers.         #
#############################################

name: Nightly image update

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run - preview changes without committing"
        required: false
        default: false
        type: boolean

  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write
  packages: write

jobs:
  update:
    uses: ./.github/workflows/update-images.yml
    with:
      dry_run: ${{ inputs.dry_run || false }}
    secrets: inherit
